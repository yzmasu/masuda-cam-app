<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #container { position: relative; width: 100vw; height: 100dvh; }
    /* 今回から、video自体は隠して、合成結果をcanvasにだけ描画します */
    video { display: none; }
    canvas { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
      transform: scaleX(-1); /* インカメラ用に鏡のように左右反転させます */
    }
    #shutter {
      position: absolute; 
      bottom: calc(40px + env(safe-area-inset-bottom)); 
      left: 50%; transform: translateX(-50%);
      width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #ccc;
      z-index: 10;
    }
    #start_btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      background-color: #007AFF; color: white; border: none; border-radius: 8px;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="shutter"></div>
    <button id="start_btn">カメラを起動</button>
  </div>

 <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('start_btn');

    // ★追加1：画像の読み込み状態をチェックする仕組み
    const maskImage = new Image();
    maskImage.src = './mask.png'; // 念のため相対パス（./）に変更
    let isMaskLoaded = false;
    maskImage.onload = () => { isMaskLoaded = true; };
    maskImage.onerror = () => { alert("イラスト画像の読み込みに失敗しました。ファイル名を確認してください。"); };

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      // カメラ映像を描画
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      // ★追加2：画面左上に赤い文字でステータスを表示（デバッグ用）
      canvasCtx.font = "24px sans-serif";
      canvasCtx.fillStyle = "red";

      if (results.detections.length > 0) {
        canvasCtx.fillText("顔認識：OK！", 20, 50);

        if (isMaskLoaded) {
          canvasCtx.fillText("画像：OK！", 20, 80);
          
          // 顔にイラストをかぶせる処理
          const bbox = results.detections[0].boundingBox;
          const width = bbox.width * canvasElement.width * 1.5; 
          const height = bbox.height * canvasElement.height * 1.5;
          const x = (bbox.xMin * canvasElement.width) - (width - bbox.width * canvasElement.width) / 2;
          const y = (bbox.yMin * canvasElement.height) - (height - bbox.height * canvasElement.height) / 2 - 30;
          canvasCtx.drawImage(maskImage, x, y, width, height);
        } else {
          canvasCtx.fillText("画像：読み込み中...", 20, 80);
        }
      } else {
        canvasCtx.fillText("顔認識：探しています...", 20, 50);
      }
    }

    // 顔認識エンジンの設定
    const faceDetection = new FaceDetection({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
    }});
    faceDetection.setOptions({
      model: 'short',
      minDetectionConfidence: 0.5
    });
    faceDetection.onResults(onResults);

    // カメラの起動処理
    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false,
        });
        videoElement.srcObject = stream;
        
        videoElement.addEventListener('play', () => {
          const loop = async () => {
            if (!videoElement.paused && !videoElement.ended) {
              await faceDetection.send({image: videoElement});
              requestAnimationFrame(loop);
            }
          };
          loop();
        });

        startBtn.style.display = 'none'; 
      } catch (err) {
        alert("カメラの起動に失敗しました。\n原因: " + err.name + "\n" + err.message);
      }
    }

    startBtn.addEventListener('click', setupCamera);
  </script>
</body>
</html>
