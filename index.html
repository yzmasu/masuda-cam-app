<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #container { position: relative; width: 100vw; height: 100dvh; }
    video { display: none; }
    canvas { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
      transform: scaleX(-1); 
    }
    
    /* 撮影ボタン */
    #shutter {
      position: absolute; 
      bottom: calc(40px + env(safe-area-inset-bottom)); 
      left: 50%; transform: translateX(-50%);
      width: 80px; height: 80px; background: white; border-radius: 50%; 
      border: 6px solid rgba(0,0,0,0.2); box-shadow: 0 0 10px rgba(0,0,0,0.5);
      z-index: 10;
    }
    #shutter:active { background: #ccc; }

    /* カメラ切り替えボタン */
    #switch_btn {
      position: absolute; 
      top: calc(20px + env(safe-area-inset-top)); 
      right: 20px;
      width: 50px; height: 50px; 
      background: rgba(0,0,0,0.4); color: white;
      border-radius: 50%; border: 2px solid white; font-size: 24px;
      display: flex; justify-content: center; align-items: center; 
      z-index: 20;
    }

    /* 復活させた起動ボタン */
    #start_btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      background-color: #007AFF; color: white; border: none; border-radius: 8px;
      z-index: 30; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="shutter"></div>
    <div id="switch_btn">🔄</div>
    <button id="start_btn">カメラを起動</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const shutterBtn = document.getElementById('shutter');
    const switchBtn = document.getElementById('switch_btn');
    const startBtn = document.getElementById('start_btn');

    const maskImage = new Image();
    maskImage.src = './mask.png'; 
    let isMaskLoaded = false;
    maskImage.onload = () => { isMaskLoaded = true; };

    let useFrontCamera = true;

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.detections.length > 0 && isMaskLoaded) {
        const bbox = results.detections[0].boundingBox;
        const faceWidth = bbox.width * canvasElement.width;
        const faceHeight = bbox.height * canvasElement.height;
        
        const faceLeft = (bbox.xmin !== undefined) 
          ? (bbox.xmin * canvasElement.width) 
          : (bbox.xCenter * canvasElement.width) - (faceWidth / 2);
          
        const faceTop = (bbox.ymin !== undefined) 
          ? (bbox.ymin * canvasElement.height) 
          : (bbox.yCenter * canvasElement.height) - (faceHeight / 2);

        // ★サイズを2.7倍に調整
        const drawWidth = faceWidth * 2.7; 
        const drawHeight = faceHeight * 2.7;
        
        // ★位置の微調整（2.7倍に合わせて中心と高さを最適化）
        const x = faceLeft - (drawWidth - faceWidth) / 2;
        const y = faceTop - (drawHeight - faceHeight) / 2 - (faceHeight * 0.3);

        canvasCtx.drawImage(maskImage, x, y, drawWidth, drawHeight);
      }
    }

    const faceDetection = new FaceDetection({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
    }});
    faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    faceDetection.onResults(onResults);

    let isPlaying = false;
    videoElement.addEventListener('play', () => {
      if (isPlaying) return;
      isPlaying = true;
      const loop = async () => {
        if (!videoElement.paused && !videoElement.ended) {
          await faceDetection.send({image: videoElement});
          requestAnimationFrame(loop);
        } else {
          isPlaying = false;
        }
      };
      loop();
    });

    async function setupCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: useFrontCamera ? "user" : "environment" },
          audio: false,
        });
        videoElement.srcObject = stream;
        canvasElement.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
        
        // 起動に成功したらボタンを消す
        startBtn.style.display = 'none';
      } catch (err) {
        alert("カメラの起動に失敗しました。設定を確認してください。");
      }
    }

    switchBtn.addEventListener('click', async () => {
      if (videoElement.srcObject) {
        videoElement.srcObject.getTracks().forEach(track => track.stop());
      }
      useFrontCamera = !useFrontCamera;
      await setupCamera();
    });

    async function takePhoto() {
      canvasElement.toBlob(async (blob) => {
        const file = new File([blob], "mask_photo.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: '増田さんのイラストカメラ' });
          } catch (err) {
            console.log("共有キャンセル");
          }
        } else {
          alert("保存に対応していません。");
        }
      }, 'image/png');
    }
    shutterBtn.addEventListener('click', takePhoto);
    
    // ボタンをクリックしたときにカメラを起動
    startBtn.addEventListener('click', setupCamera);
  </script>
</body>
</html>
