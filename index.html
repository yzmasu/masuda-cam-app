<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #container { position: relative; width: 100vw; height: 100dvh; }
    video { display: none; }
    canvas { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
      /* ★インカメラ用に鏡のような左右反転を復活させました */
      transform: scaleX(-1); 
    }
    
    /* 撮影ボタン */
    #shutter {
      position: absolute; 
      bottom: calc(40px + env(safe-area-inset-bottom)); 
      left: 50%; transform: translateX(-50%);
      width: 80px; height: 80px; background: white; border-radius: 50%; 
      border: 6px solid rgba(0,0,0,0.2); box-shadow: 0 0 10px rgba(0,0,0,0.5);
      z-index: 10;
    }
    #shutter:active { background: #ccc; }

    /* 起動ボタン */
    #start_btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      background-color: #007AFF; color: white; border: none; border-radius: 8px;
      z-index: 30; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="shutter"></div>
    <button id="start_btn">カメラを起動</button>
  </div>

          : (bbox.xCenter * canvasElement.width) - (faceWidth / 2);

        const drawHeight = faceHeight * 2.7;

        const y = faceTop - (drawHeight - faceHeight) / 2 - (faceHeight * 0.3);

        canvasCtx.drawImage(maskImage, x, y, drawWidth, drawHeight);
      }
    }
